# Build and deploy the static site to GitHub Pages on every push to
# `main`.  Uses the official actions/configure-pages → upload-pages-artifact
# → deploy-pages flow so we don't push to a `gh-pages` branch — Pages
# pulls the artifact straight out of the Actions storage instead.
#
# Vite picks `base: '/Luminoir/'` automatically because
# `process.env.GITHUB_ACTIONS` is set in CI (see vite.config.js).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping queued runs in
# between.  A push that lands while a deploy is in flight cancels
# the in-flight one — the queued (newer) commit is what's served.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
